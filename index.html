<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Agrinho 2026</title>

    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; background-color: #f4f9f4; color: #333; transition: 0.3s; }
        header { background-color: #2e7d32; color: white; padding: 20px; text-align: center; border-radius: 5px; }
        section { background: white; padding: 20px; margin-top: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: #333; }
        footer { margin-top: 30px; text-align: center; font-size: 0.9em; color: #666; }
        
        /* Botão em formato de quadradinho fixo no canto superior direito */
        .btn-tema { 
            position: fixed; 
            top: 15px; 
            right: 15px; 
            background-color: #ffffff; 
            color: #2e7d32; 
            border: 2px solid #2e7d32; 
            padding: 8px 12px; 
            border-radius: 8px; /* Cantos levemente arredondados para o quadradinho */
            cursor: pointer; 
            font-size: 1.3rem; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.15); /* Sombra para dar destaque */
            z-index: 1000; 
            transition: 0.3s;
        }
        
        /* Estilo do Modo Escuro */
        body.modo-escuro { background-color: #1e1e1e; color: #f4f9f4; }
        body.modo-escuro section { background-color: #2d2d2d; color: #fff; }
        
        /* Ajuste das cores do quadradinho no modo escuro */
        body.modo-escuro .btn-tema { 
            background-color: #2d2d2d; 
            color: #ffffff; 
            border: 2px solid #ffffff; 
        }
    </style>
</head>
<body>

    <button class="btn-tema" id="botaoTema" onclick="mudarTema()">🌙</button>

    <header>
        <h1>Projeto Agrinho 2026</h1>
        <p>Tema do Trabalho: [Insira o Tema Aqui]</p>
    </header>

    <section>
        <h2>Introdução</h2>
        <p>Escreva aqui o resumo ou a introdução sobre o seu projeto do Agrinho.</p>
    </section>

    <section>
        <h2>Desenvolvimento</h2>
        <p>Aqui você pode colocar os principais dados e ideias do seu grupo.</p>
    </section>

    <footer>
        <p>Componentes: [Seu Nome] | Escola: [Nome da Escola]</p>
    </footer>

    <script>
        function mudarTema() {
            document.body.classList.toggle("modo-escuro");
            const botao = document.getElementById("botaoTema");
            
            if (document.body.classList.contains("modo-escuro")) {
                botao.innerText = "☀️";
            } else {
                botao.innerText = "🌙";
            }
        }
    </script>

</body>
</html>
